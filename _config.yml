# Site settings
title:              Jaydeep Malik - Personal Blog
logo:               /images/main/author-jd.png
description:        Policing, Cyber Security, Computers
baseurl:            '' # The subpath of your site, e.g. /blog
url:                'https://jaydeepmalik.com' # The base hostname & protocol for your site
twitter:            https://twitter.com/jaydeepmalik
# facebook:           https://www.facebook.com/
instagram:          https://www.instagram.com/jaydeepmalik

markdown:  kramdown
permalink: pretty
paginate:  11
sass:
  style: compressed

gems:
  - jekyll-paginate
  - jekyll/tagging

include:
  - _pages

exclude:
  - vendor
  - Gemfile
  - Gemfile.lock

# Tags
tag_page_dir:         tag
tag_page_layout:      tag_page
tag_permalink_style:  pretty

# Pages path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

# Authors
authors:
  Jaydeep:
    name:       Jaydeep Malik
    bio:        Point to be noted.
    gravatar:   /images/main/author-jd.png
    email:      hi@jaydeepmalik.com
    instagram:  http://instagram.com/jaydeepmalik
    github:     https://github.com/jaydeepmalik
    twitter:    https://twitter.com/jaydeepmalik
