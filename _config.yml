# Site settings
title:          Jaydeep Malik
description:    "Cyber Security, Advance Policing."
baseurl:        "/"
url:            "https://jaydeepmalik.com"

# Google Analytics
google_analytics: UA—XXXXXXXX-X

# Build settings
markdown:       kramdown
include:
  - _pages

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jemoji

# Permalinks
permalink:      /:categories/:title/
paginate:       5

# Excludes
exclude: [ Gemfile, Gemfile.lock, tale.gemspec ]

# Disqus (Set to your disqus id)
disqus:         jaydeepmalik
