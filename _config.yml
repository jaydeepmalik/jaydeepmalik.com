# Site settings
title:          Jaydeep Malik
description:    "Cyber Security, Advance Policing."
baseurl:        "/"
url:            "https://jaydeepmalik.com"

# Google Analytics
google_analytics: UA—XXXXXXXX-X

# Build settings
markdown:       kramdown
include:
  - _pages

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed #feed support
  - jekyll-paginate #paginate support
  - jekyll-seo-tag #seo support
  - jemoji #emoji support

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Excludes
exclude: [ Gemfile, Gemfile.lock, tale.gemspec ]

# Disqus (Set to your disqus id)
disqus:         jaydeepmalik
